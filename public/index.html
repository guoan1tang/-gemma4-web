<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gemma Web</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1e1e2e;
      color: #cdd6f4;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
      font-size: 14px;
      line-height: 1.5;
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* Left Panel */
    #sidebar {
      width: 220px;
      min-width: 220px;
      background: #181825;
      border-right: 1px solid #313244;
      display: flex;
      flex-direction: column;
      padding: 12px;
      gap: 12px;
      overflow-y: auto;
    }
    #sidebar .status-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      padding: 4px 8px;
      border-radius: 6px;
    }
    #sidebar .status-indicator.ready { background: #a6e3a1; color: #1e1e2e; }
    #sidebar .status-indicator.loading { background: #f9e2af; color: #1e1e2e; }
    #sidebar .status-indicator.error { background: #f38ba8; color: #1e1e2e; }
    #sidebar .status-indicator.idle { background: #313244; color: #a6adc8; }
    .sidebar-section { border-bottom: 1px solid #313244; padding-bottom: 10px; }
    .sidebar-section:last-child { border-bottom: none; }
    .sidebar-label {
      font-size: 11px;
      color: #6c7086;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    #model-select {
      width: 100%;
      padding: 6px 8px;
      background: #313244;
      color: #cdd6f4;
      border: 1px solid #45475a;
      border-radius: 6px;
      font-family: inherit;
      font-size: 12px;
    }
    #prompt-presets {
      width: 100%;
      padding: 6px 8px;
      background: #313244;
      color: #cdd6f4;
      border: 1px solid #45475a;
      border-radius: 6px;
      font-family: inherit;
      font-size: 12px;
      margin-bottom: 4px;
    }
    #system-prompt {
      width: 100%;
      padding: 6px 8px;
      background: #313244;
      color: #cdd6f4;
      border: 1px solid #45475a;
      border-radius: 6px;
      font-family: inherit;
      font-size: 11px;
      resize: vertical;
    }
    #system-prompt:focus { border-color: #89b4fa; }
    #system-prompt:disabled { opacity: 0.5; }
    #system-prompt::placeholder { color: #6c7086; }
    #prompt-presets:focus { border-color: #89b4fa; }
    .stat-row {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      margin-bottom: 4px;
    }
    .stat-value { color: #a6e3a1; }
    .sidebar-btn {
      width: 100%;
      padding: 6px 10px;
      background: #313244;
      color: #cdd6f4;
      border: none;
      border-radius: 6px;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      margin-bottom: 6px;
    }
    .sidebar-btn:hover { background: #45475a; }
    .sidebar-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .sidebar-btn.danger { background: #f38ba8; color: #1e1e2e; }
    .sidebar-btn.danger:hover { background: #eba0ac; }
    #progress-bar-container { display: none; margin-top: 8px; }
    #progress-bar-container.active { display: block; }
    #progress-bar {
      width: 100%;
      height: 6px;
      background: #313244;
      border-radius: 3px;
      overflow: hidden;
    }
    #progress-bar-fill {
      width: 0%;
      height: 100%;
      background: #89b4fa;
      transition: width 0.3s;
    }
    #progress-text { font-size: 11px; color: #6c7086; margin-top: 4px; }

    /* Right Panel - Chat */
    #chat-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      position: relative;
    }
    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }
    .message {
      margin-bottom: 16px;
      max-width: 80%;
    }
    .message.user { margin-left: auto; }
    .message.assistant { margin-right: auto; }
    .message-bubble {
      padding: 10px 14px;
      border-radius: 12px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .message.user .message-bubble {
      background: #45475a;
      color: #cdd6f4;
      border-bottom-right-radius: 2px;
    }
    .message.assistant .message-bubble {
      background: #1e1e3a;
      color: #cdd6f4;
      border-bottom-left-radius: 2px;
    }
    .message-bubble p { margin-bottom: 8px; }
    .message-bubble p:last-child { margin-bottom: 0; }
    .message-bubble pre {
      background: #181825;
      padding: 12px;
      border-radius: 6px;
      overflow-x: auto;
      margin: 8px 0;
    }
    .message-bubble code {
      font-family: inherit;
      background: #313244;
      padding: 1px 4px;
      border-radius: 3px;
      font-size: 13px;
    }
    .message-bubble pre code {
      background: none;
      padding: 0;
    }
    .message-bubble ul, .message-bubble ol { margin-left: 20px; }
    .message-bubble blockquote {
      border-left: 3px solid #89b4fa;
      padding-left: 12px;
      color: #6c7086;
    }

    /* Input Area */
    #input-area {
      display: flex;
      padding: 12px 20px;
      background: #181825;
      border-top: 1px solid #313244;
      gap: 8px;
    }
    #message-input {
      flex: 1;
      padding: 10px 14px;
      background: #313244;
      border: 1px solid #45475a;
      border-radius: 8px;
      color: #cdd6f4;
      font-family: inherit;
      font-size: 14px;
      outline: none;
    }
    #message-input:focus { border-color: #89b4fa; }
    #message-input:disabled { opacity: 0.5; }
    #send-btn {
      padding: 10px 20px;
      background: #89b4fa;
      color: #1e1e2e;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
    }
    #send-btn:hover { background: #74c7ec; }
    #send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Loading Overlay */
    #loading-overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(30, 30, 46, 0.85);
      justify-content: center;
      align-items: center;
      z-index: 10;
    }
    #loading-overlay.active { display: flex; }
    #loading-overlay-text {
      font-size: 18px;
      color: #89b4fa;
    }

    /* WebGPU Warning */
    #webgpu-warning {
      display: none;
      padding: 12px 20px;
      background: #f38ba8;
      color: #1e1e2e;
      font-size: 13px;
      text-align: center;
    }
    #webgpu-warning.active { display: block; }

    #webgpu-warning.active { display: block; }

    /* Chat Panel Header (mobile only) */
    #chat-header {
      display: none;
      padding: 12px 16px;
      background: #181825;
      border-bottom: 1px solid #313244;
      align-items: center;
      gap: 12px;
    }
    #chat-header .header-title {
      flex: 1;
      font-size: 14px;
      font-weight: bold;
      color: #89b4fa;
    }
    #sidebar-toggle-btn {
      background: none;
      border: none;
      color: #cdd6f4;
      font-size: 22px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
    }
    #sidebar-toggle-btn:hover { background: #313244; }

    /* Sidebar overlay & backdrop (mobile) */
    #sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 90;
    }

    /* Cursor blink */
    .cursor::after {
      content: '\258B';
      animation: blink 1s step-end infinite;
      color: #89b4fa;
    }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    /* ---- Mobile Responsive ---- */
    @media (max-width: 768px) {
      #sidebar {
        position: fixed;
        top: 0; left: 0; bottom: 0;
        width: 260px;
        z-index: 100;
        transform: translateX(-100%);
        transition: transform 0.25s ease;
        background: #181825;
      }
      #sidebar.open { transform: translateX(0); }
      #sidebar-overlay.active { display: block; }

      #chat-header { display: flex; }
    }

    @media (max-width: 480px) {
      body { font-size: 13px; }
      #chat-messages { padding: 12px; }
      .message { max-width: 95%; }
      #input-area { padding: 8px 12px; }
      #message-input { font-size: 13px; padding: 8px 12px; }
      #send-btn { padding: 8px 16px; font-size: 13px; }
      #sidebar { width: 85vw; }
    }
  </style>
</head>
<body>
  <div id="sidebar-overlay"></div>
  <div id="sidebar">
    <div id="status-indicator" class="status-indicator idle">Initializing...</div>

    <div class="sidebar-section">
      <div class="sidebar-label">Model</div>
      <select id="model-select"></select>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">System Prompt</div>
      <select id="prompt-presets">
        <option value="">-- Presets --</option>
        <option value="english-tutor">English Tutor</option>
        <option value="code-reviewer">Code Reviewer</option>
        <option value="translator">Translator</option>
      </select>
      <textarea id="system-prompt" rows="4" placeholder="e.g. You are a helpful assistant..."></textarea>
      <div style="display:flex;gap:4px;margin-top:4px;">
        <button class="sidebar-btn" id="save-prompt-btn" style="margin:0;">Save</button>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">GPU Memory</div>
      <div class="stat-row">
        <span>Used</span>
        <span class="stat-value" id="gpu-memory">—</span>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Performance</div>
      <div class="stat-row">
        <span>Tokens/s</span>
        <span class="stat-value" id="tokens-per-sec">—</span>
      </div>
    </div>

    <div class="sidebar-section">
      <div id="progress-bar-container">
        <div class="sidebar-label">Download</div>
        <div id="progress-bar"><div id="progress-bar-fill"></div></div>
        <div id="progress-text"></div>
      </div>
      <button class="sidebar-btn" id="stop-btn" style="display:none;">Stop Generation</button>
      <button class="sidebar-btn danger" id="unload-btn" style="display:none;">Unload Model</button>
      <button class="sidebar-btn" id="new-conv-btn">New Conversation</button>
    </div>
  </div>

  <div id="chat-panel">
    <div id="chat-header">
      <button id="sidebar-toggle-btn" aria-label="Toggle sidebar">&#9776;</button>
      <span class="header-title">Gemma</span>
    </div>
    <div id="webgpu-warning">Your browser does not support WebGPU. Please use Chrome 113+ or Edge 113+.</div>
    <div id="chat-messages"></div>
    <div id="input-area">
      <input id="message-input" type="text" placeholder="Type a message..." autofocus disabled />
      <button id="send-btn" disabled>Send</button>
    </div>
    <div id="loading-overlay"><div id="loading-overlay-text">Loading model...</div></div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "@mlc-ai/web-llm": "https://esm.run/@mlc-ai/web-llm",
      "marked": "https://esm.run/marked"
    }
  }
  </script>
  <script type="module" src="app.js"></script>
</body>
</html>
